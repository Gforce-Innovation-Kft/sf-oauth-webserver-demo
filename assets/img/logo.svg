<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:0.2" />
    </linearGradient>
    
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d6efd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" opacity="0.3"/>
  
  <!-- Stylized "G" with circuit/tech pattern -->
  <g filter="url(#glow)">
    <!-- Main G shape -->
    <path d="M100 30 C130 30, 155 55, 155 85 C155 100, 150 112, 142 120 L120 120 L120 100 L135 100 C135 93, 135 75, 120 60 C105 45, 85 45, 70 60 C55 75, 55 95, 55 110 C55 125, 55 145, 70 160 C85 175, 105 175, 120 160 C125 155, 128 148, 130 140 L150 145 C147 158, 140 170, 128 180 C110 195, 80 195, 60 175 C45 160, 40 140, 40 110 C40 80, 50 60, 70 45 C85 32, 115 30, 100 30 Z" 
          fill="url(#mainGradient)" 
          stroke="url(#accentGradient)" 
          stroke-width="2"/>
    
    <!-- Force/Lightning element -->
    <path d="M115 75 L108 90 L115 90 L110 105 L120 92 L113 92 L118 75 Z" 
          fill="#4a9eff" 
          opacity="0.9">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </path>
    
    <!-- Tech circuit dots -->
    <circle cx="125" cy="65" r="2" fill="#4a9eff" opacity="0.8"/>
    <circle cx="135" cy="80" r="2" fill="#0d6efd" opacity="0.8"/>
    <circle cx="75" cy="70" r="2" fill="#f57c00" opacity="0.8"/>
    <circle cx="65" cy="90" r="2" fill="#4a9eff" opacity="0.8"/>
    <circle cx="70" cy="130" r="2" fill="#0d6efd" opacity="0.8"/>
    <circle cx="110" cy="150" r="2" fill="#f57c00" opacity="0.8"/>
  </g>
  
  <!-- Connecting lines (circuit pattern) -->
  <g stroke="url(#accentGradient)" stroke-width="1" opacity="0.3" fill="none">
    <line x1="125" y1="65" x2="135" y2="80"/>
    <line x1="75" y1="70" x2="65" y2="90"/>
    <line x1="70" y1="130" x2="110" y2="150"/>
  </g>
</svg>